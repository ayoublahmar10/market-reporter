name: Deploy to AWS Lambda

# Trigger: runs automatically on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest  # GitHub gives us a free Linux machine

    steps:
      # 1. Download the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Python 3.12 (same version as Lambda runtime)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Build the Lambda package
      #    - C extensions (numpy, cryptography...) → compiled for Linux x86_64 / Python 3.12
      #    - Pure Python packages (feedparser...) → normal install
      - name: Build Lambda package
        run: |
          mkdir lambda_package

          pip install \
            yfinance groq python-dotenv requests \
            cffi cryptography lxml curl_cffi \
            pydantic pydantic-core \
            --target lambda_package \
            --platform manylinux2014_x86_64 \
            --python-version 3.12 \
            --implementation cp \
            --only-binary=:all: \
            --upgrade

          pip install feedparser sgmllib3k multitasking \
            --target lambda_package \
            --upgrade

          cp *.py lambda_package/
          cp -r collectors/ lambda_package/collectors/

          cd lambda_package
          zip -r ../lambda_package.zip . -x "*.pyc" -x "*/__pycache__/*"
          cd ..

          echo "Package size: $(du -sh lambda_package.zip | cut -f1)"

      # 4. Configure AWS credentials (stored securely in GitHub Secrets)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. Upload zip to S3 (direct upload limit is 69MB — S3 has no limit)
      - name: Upload to S3
        run: |
          aws s3 cp lambda_package.zip s3://${{ secrets.S3_BUCKET }}/lambda_package.zip

      # 6. Deploy both Lambda functions from S3
      - name: Deploy to Lambda
        run: |
          # Main reporter function (daily reports)
          aws lambda update-function-code \
            --function-name market-reporter \
            --s3-bucket ${{ secrets.S3_BUCKET }} \
            --s3-key lambda_package.zip

          # Subscription API function (signup form)
          aws lambda update-function-code \
            --function-name market-reporter-subscribe \
            --s3-bucket ${{ secrets.S3_BUCKET }} \
            --s3-key lambda_package.zip

          echo "✓ Both functions deployed successfully!"
